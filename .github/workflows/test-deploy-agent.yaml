name: Test Deploy Agents

on:
  workflow_dispatch: # 手動実行 (テスト用)

permissions:
  id-token: write
  contents: read

env:
  PROJECT_ENDPOINT: ${{ secrets.AIFOUNDRY_PROJECT_ENDPOINT }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Foundry token
        id: token
        run: |
          TOKEN=$(az account get-access-token \
            --resource https://ai.azure.com \
            --query accessToken -o tsv)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy agents with Azure REST API (TEST)
        run: |
          f="agents/deploy-test.json"
          AGENT_NAME="test-deploy-agent"

          BODY=$(jq -n \
            --arg name "$AGENT_NAME" \
            --slurpfile def "$f" \
            '{
              "name": $name,
              "definition": $def[0]
            }')

          curl -X POST \
            "$PROJECT_ENDPOINT/agents/$AGENT_NAME?api-version=v1" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "$BODY"
